# Reduce noisy third-party visualization logs in console output.
org.slf4j.simpleLogger.defaultLogLevel=warn

# Graphviz Java internals (dot invocation and temp file chatter).
org.slf4j.simpleLogger.log.guru.nidi.graphviz=error
org.slf4j.simpleLogger.log.guru.nidi.graphviz.model.Serializer=error
org.slf4j.simpleLogger.log.guru.nidi.graphviz.engine.GraphvizCmdLineEngine=error
org.slf4j.simpleLogger.log.guru.nidi.graphviz.service.CommandLineExecutor=error

# Keep LJV mostly quiet too.
org.slf4j.simpleLogger.log.org.atpfivt.ljv=warn
